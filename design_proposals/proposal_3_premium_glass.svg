<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" fill="#0F172A"/>
  
  <!-- Background Glow -->
  <circle cx="200" cy="200" r="300" fill="#3B82F6" fill-opacity="0.15">
    <animate attributeName="opacity" values="0.1;0.2;0.1" dur="5s" repeatCount="indefinite" />
  </circle>
  <circle cx="1000" cy="600" r="250" fill="#8B5CF6" fill-opacity="0.1">
    <animate attributeName="opacity" values="0.05;0.15;0.05" dur="7s" repeatCount="indefinite" />
  </circle>

  <!-- Glass Card -->
  <rect x="150" y="100" width="900" height="600" rx="40" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.1"/>
  <rect x="150" y="100" width="900" height="600" rx="40" fill="url(#glass_grad)"/>
  
  <defs>
    <linearGradient id="glass_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:white;stop-opacity:0.01" />
    </linearGradient>
  </defs>

  <!-- Sidebar Glass -->
  <rect x="150" y="100" width="80" height="600" rx="40 0 0 40" fill="white" fill-opacity="0.02" stroke="white" stroke-opacity="0.1"/>
  <circle cx="190" cy="150" r="20" fill="#6366F1"/>
  <rect x="175" y="220" width="30" height="30" rx="8" fill="white" fill-opacity="0.1"/>
  <rect x="175" y="270" width="30" height="30" rx="8" fill="white" fill-opacity="0.1"/>
  <rect x="175" y="320" width="30" height="30" rx="8" fill="white" fill-opacity="0.1"/>

  <!-- Content -->
  <text x="270" y="160" fill="white" font-family="Inter, sans-serif" font-size="32" font-weight="900" opacity="0.9">Intelligence Pédagogique</text>
  <text x="270" y="200" fill="white" font-family="Inter, sans-serif" font-size="16" opacity="0.4">Propulsé par FichePro & Gemini AI</text>

  <rect x="270" y="260" width="620" height="300" rx="32" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.05"/>
  <circle cx="580" cy="410" r="50" fill="#6366F1" fill-opacity="0.2"/>
  <path d="M570 410L590 410M580 400L580 420" stroke="white" stroke-width="3" stroke-linecap="round"/>
  
  <text x="580" y="490" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="14" font-weight="600" opacity="0.6">Cliquez pour initier la magie</text>

  <!-- Bottom Badges -->
  <rect x="270" y="600" width="120" height="40" rx="20" fill="#6366F1" fill-opacity="0.2" stroke="#6366F1" stroke-opacity="0.3"/>
  <text x="330" y="625" text-anchor="middle" fill="#818CF8" font-family="Inter, sans-serif" font-size="12" font-weight="700">PREMIUM</text>
  
  <rect x="410" y="600" width="120" height="40" rx="20" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1"/>
  <text x="470" y="625" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="12" font-weight="700" opacity="0.6">OFFICIEL</text>
</svg>